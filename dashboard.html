<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis proyectos — PAF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/portal.css">
</head>
<body class="portal-body">
  <header class="portal-header">
    <a href="/" class="logo">
      <img src="PAF_logo.svg" alt="PAF" width="180" height="21">
    </a>
    <div class="portal-actions">
      <a href="/" class="btn btn-ghost btn-sm">Inicio</a>
      <button type="button" class="btn btn-ghost btn-sm" id="logout-btn">Salir</button>
    </div>
  </header>

  <main class="portal-main">
    <div class="portal-toolbar">
      <div>
        <h1>Mis proyectos</h1>
        <p class="portal-user" id="user-greeting"></p>
      </div>
    </div>
    <div class="client-summary metrics-row" id="client-summary" aria-label="Resumen de proyectos"></div>

    <div class="projects-grid" id="projects-grid"></div>
    <div class="empty-state" id="empty-state" hidden>No tienes proyectos asignados.</div>

    <section class="client-estimations-section" id="client-estimations-section" hidden>
      <p class="panel-label">Estimaciones</p>
      <div class="estimations-readonly" id="client-estimations-list"></div>
    </section>
  </main>

  <script src="js/portal.js"></script>
  <script src="js/indirect-costs.js"></script>
  <script src="js/project-estimations.js?v=47"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
